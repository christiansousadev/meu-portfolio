# ============================================================
# Nginx - SPA estatica para React/Vite
# Termina TLS no proxy reverso de fora (Traefik/Caddy/Nginx host)
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Logs em stdout/stderr (containers nao gravam em /var/log)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Compressao para reduzir banda
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache agressivo para assets imutaveis (hash no nome do arquivo)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota nao encontrada cai em index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bloqueia acesso a arquivos sensiveis
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Headers de seguranca minimos (CSP fica no backend para a API)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
