# ============================================================
# nginx do container frontend
# serve a spa estatica e faz proxy reverso /api/ -> backend:8000
# tls termina no nginx do host; aqui so http
# ============================================================

# upstream nomeado: dns interno do docker resolve "backend" para o ip
# do container portfolio-backend dentro da rede portfolio-net
upstream portfolio_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # logs em stdout/stderr para o coletor de logs do docker
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # compressao para reduzir banda
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # proxy reverso para a api: precede o location / para ter prioridade
    location /api/ {
        proxy_pass http://portfolio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # cache agressivo para assets imutaveis (hash no nome do arquivo)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # spa fallback: qualquer rota nao encontrada cai em index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # bloqueia acesso a arquivos sensiveis
    location ~ /\.(?!well-known) {
        deny all;
    }

    # headers de seguranca minimos (csp restritiva fica no backend para a api)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
